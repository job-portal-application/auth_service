on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Docker Image
        run: docker build -t auth-service .

      - name: Run Jest Tests inside Docker
        run: docker run --rm -v $PWD/coverage:/app/coverage auth-service npm run coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: c7e703ed6f5ee5fb9e9c4cb2e428064d8214dba9
