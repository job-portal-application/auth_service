name: Development

on:
    workflow_run:
        workflows:
            - CI
        types:
            - completed
        branches:
            - development

jobs:
    deploy:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        environment: development

        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build docker image
              run: |
                docker build -t auth_service .

            - name: Tag docker image
              run: |
                docker tag auth_service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/auth_service:latest

            - name: Push docker image to ECR
              run: |
                docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/auth_service:latest

            - name: Deploy to ECS
              run: |
                  aws ecs update-service \
                  --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
                  --service ${{ secrets.ECS_SERVICE_NAME }} \
                  --force-new-deployment